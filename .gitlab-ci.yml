# ============================================
# Pipeline CI/CD para proyecto_deteccion_plantas
# Etapas: Test -> Build -> Deploy
# ============================================

variables:
  UV_VERSION: "0.10.9"
  PYTHON_VERSION: "3.12"
  BASE_LAYER: "trixie-slim"
  DOCKER_REGISTRY: "docker.io"
  IMAGE_NAME: "${DOCKER_REGISTRY}/${DOCKER_USER}/proyecto-deteccion-plantas"
  IMAGE_TAG: "latest"
  DOCKER_BUILDKIT: 1
  UV_CACHE_DIR: ".uv-cache"

# Definir etapas del pipeline
stages:
  - test
  - build
  - deploy

# ============================================
# STAGE: TEST
# Ejecutar tests unitarios e integracion
# ============================================
run_tests:
  stage: test
  image: ghcr.io/astral-sh/uv:${UV_VERSION}-python${PYTHON_VERSION}-${BASE_LAYER}
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends 
        make libglib2.0-0 libgl1 libxcb1 git
    - rm -rf /var/lib/apt/lists/*
  script:
    - echo "📦 Instalando dependencias..."
    - uv sync
    - echo "🧪 Ejecutando tests..."
    - make test
    - echo "✅ Tests completados exitosamente"
  cache:
    key:
      files:
        - pyproject.toml
        - uv.lock
    paths:
      - .uv-cache/
      - .venv
  artifacts:
    paths:
      - .coverage
      - coverage.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 30 days
  coverage: '/TOTAL.*\s+(\d+%)$/'
  only:
    - merge_requests
    - main
    - develop

# ============================================
# STAGE: BUILD
# Construir imagen Docker
# ============================================
build_docker_image:
  stage: build
  image: docker:29.3.0-cli
  services:
    - docker:29.3.0-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "🔐 Autenticando en Docker Registry..."
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin "$DOCKER_REGISTRY"
  script:
    - echo "🐳 Construyendo imagen Docker..."
    - |
      docker build \
        --cache-from $IMAGE_NAME:latest \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        -t $IMAGE_NAME:${CI_COMMIT_SHORT_SHA} \
        -t $IMAGE_NAME:latest \
        .
    - echo "📤 Pusheando imagen a Docker Hub..."
    - docker push $IMAGE_NAME:${CI_COMMIT_SHORT_SHA}
    - docker push $IMAGE_NAME:latest
    - echo "✅ Imagen construida y pusheada: $IMAGE_NAME:latest"
  after_script:
    - docker logout
  only:
    - main
    - develop
  except:
    - merge_requests

# ============================================
# STAGE: DEPLOY
# Desplegar a servidor en DigitalOcean
# ============================================
deploy_to_production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client sshpass curl
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - echo "🚀 Iniciando despliegue en producción..."
    - echo "📍 Servidor: $SERVER_HOST"
    
    # Ejecutar script de deployment en el servidor
    - |
      ssh -i ~/.ssh/id_rsa root@$SERVER_HOST << 'EOF'
        set -e
        echo "📂 Navegando a directorio de la aplicación..."
        cd /app/proyecto_deteccion_plantas
        
        echo "🔄 Deteniendo contenedores actuales..."
        docker-compose -f config/docker-compose.yml down || true
        
        echo "🔐 Autenticando en Docker Registry..."
        echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin docker.io
        
        echo "📥 Descargando nueva imagen..."
        docker pull $IMAGE_NAME:latest
        
        echo "📝 Actualizando .env si es necesario..."
        test -f config/.env || cp config/.env.example config/.env
        
        echo "🚀 Iniciando contenedores..."
        docker-compose -f config/docker-compose.yml up -d
        
        echo "⏳ Esperando a que los servicios estén listos..."
        sleep 10
        
        echo "🏥 Verificando salud de los servicios..."
        docker-compose -f config/docker-compose.yml ps
        
        echo "✅ Despliegue completado exitosamente"
      EOF
    
  after_script:
    - rm -f ~/.ssh/id_rsa
  environment:
    name: production
    url: http://$SERVER_HOST:8501
    deployment_tier: production
  only:
    - main
  when: manual

# ============================================
# STAGE: DEPLOY (Staging)
# Desplegar a ambiente de staging
# ============================================
deploy_to_staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client sshpass curl
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY_STAGING" | base64 -d > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$STAGING_SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - echo "🚀 Iniciando despliegue en staging..."
    - echo "📍 Servidor: $STAGING_SERVER_HOST"
    
    - |
      ssh -i ~/.ssh/id_rsa root@$STAGING_SERVER_HOST << 'EOF'
        set -e
        cd /app/proyecto_deteccion_plantas
        
        docker-compose -f config/docker-compose.yml down || true
        echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin docker.io
        docker pull $IMAGE_NAME:latest
        test -f config/.env || cp config/.env.example config/.env
        docker-compose -f config/docker-compose.yml up -d
        sleep 10
        docker-compose -f config/docker-compose.yml ps
        echo "✅ Despliegue a staging completado"
      EOF
    
  after_script:
    - rm -f ~/.ssh/id_rsa
  environment:
    name: staging
    url: http://$STAGING_SERVER_HOST:8501
    deployment_tier: staging
  only:
    - develop
  when: manual
