version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file:
      - .env
    ports:
      - "50052:50052"
    environment:
      - MLFLOW_TRACKING_URI=file:///app/mlruns
      - GRPC_PYTHON_BUILD_WITH_CYTHON=0
    volumes:
      - ./mlruns:/app/mlruns
    networks:
      - plant-disease-net
    healthcheck:
      test: ["CMD", "sh", "-c", "python -c \"import socket; socket.create_connection(('localhost', 50052), timeout=2)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: on-failure:3
    container_name: proyecto-server

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - plant-disease-net
    environment:
      - GRPC_SERVER_HOST=server
      - GRPC_SERVER_PORT=50052
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    container_name: proyecto-app
    restart: on-failure:2
    command: streamlit run src/app.py --server.address=0.0.0.0 --client.showErrorDetails=true

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
    working_dir: /app
    command: ["uv", "run", "mlflow", "ui", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "file:///app/mlruns"]
    depends_on:
      server:
        condition: service_healthy
    networks:
      - plant-disease-net
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    container_name: proyecto-mlflow
    restart: on-failure:2

networks:
  plant-disease-net:
    driver: bridge