[pytest]
# Configuración de pytest

# Rutas de búsqueda
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones por defecto
addopts = 
    --strict-markers
    --tb=short
    -ra

# Marcadores personalizados
markers =
    slow: tests que requieren más tiempo
    integration: tests de integración
    unit: tests unitarios
    grpc: tests específicos de gRPC
    mlflow: tests de MLflow
    performance: tests de rendimiento
    ui: tests de interfaz de usuario

# Opciones de cobertura
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */.venv*/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
